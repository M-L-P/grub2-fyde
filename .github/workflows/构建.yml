name: 构建

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/构建.yml'

  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/构建.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        type: [grub2-fyde]

    name: 构建 ${{ matrix.type }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 安装依赖软件包
      run: sudo apt-get install gettext

    - name: 构建 ${{ matrix.type }}
      run: sudo bash ./构建.sh

    - name: 上传 grub2-fyde.xz
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.type }}
        path: grub2-fyde.xz

    - name: 发布
      uses: softprops/action-gh-release@v2
      with:
        name: "grub2-fyde-22.0"
        tag_name: v22.0
        make_latest: true
        body_path: docs/发布模板.md
        files: |
          grub2-fyde_full.zip
          grub2-fyde_latest.zip
          grub2-fyde_minimal.zip
          fydeOS_full.gtpk
          fydeOS_latest.gtpk
          