[dark]
switch_name = ☀︎$"Light"" | "$"Dark"☽
switch_polarity = "0"
switch_body = "apply_theme"

[USB]
switch_name = 'USB '$"Mouse: "${title_var1}
switch_polarity = "1"
switch_body = "continue"

[PS2]
switch_name = 'PS/2 '$"Trackpad"' ∨ '$"Mouse: "${title_var2}
switch_polarity = "1"
switch_body = "continue"

[keymap]
switch_name = $"Key mapping"
switch_polarity = "1"
switch_body = "continue"

[scale]
switch_name = $"Auto"
switch_polarity = "0"
switch_body = "apply_theme"

[schedule]
switch_name = $"Auto"
switch_polarity = "0"
switch_body = "apply_theme"
